name: Preview deploy

# Todo lo que se suba a la rama "preview" se publica en una URL temporal
# de prueba (canal "prueba" de Firebase Hosting) sin tocar la intranet real.
on:
  push:
    branches:
      - preview
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Minify assets
        run: |
          npx --yes esbuild@0.24.0 app.js --minify-whitespace --minify-syntax --charset=utf8 --outfile=app.js --allow-overwrite
          npx --yes esbuild@0.24.0 styles.css --minify --charset=utf8 --outfile=styles.css --allow-overwrite

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy preview channel
        run: firebase hosting:channel:deploy prueba --expires 7d --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
